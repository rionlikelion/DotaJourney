# Render Blueprint — single Node web service serving API + built Vue frontend.
# Persistent disk is mounted at data/ (same layout as riongardner.com).
# Set secrets in the Render dashboard after the first Blueprint sync.

services:
  - type: web
    name: rion-dota-journey
    runtime: node
    plan: starter
    # Root Directory in the dashboard must be blank (repo root), not server/ or frontend/.
    buildCommand: npm install --workspaces && npm --workspace frontend run build
    startCommand: node scripts/ensure-config.js && npm --workspace server run start
    healthCheckPath: /api/health
    disk:
      name: journey-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_PATH
        value: data/journey.db
      - key: CLIPS_DIRECTORY
        value: data/clips
      - key: CUTOFF_DATE
        value: "2026-05-01"
      - key: GOAL_MEDAL
        value: Legend
      - key: SYNC_SOURCE
        value: opendota
      - key: ACCOUNT_ID
        sync: false
      - key: OPENDOTA_API_KEY
        sync: false
      - key: STEAM_API_KEY
        sync: false
